################################################################################
# Create and publish a new release when a new tag is pushed
################################################################################

name: Release

on:
  push:
    tags:
      - v*

jobs:
  build_32:
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      bits: 32
      type: Release

  build_64:
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      bits: 64
      type: Release

  server_zip:
    uses: ./.github/workflows/server-zip.yml
    needs:
      - build_32
      - build_64
    with:
      build_artifact_32: ${{ needs.build_32.outputs.artifact_name }}
      build_artifact_64: ${{ needs.build_64.outputs.artifact_name }}

  create_release:
    runs-on: ubuntu-latest
    needs:
      - build_32
      - build_64
      - server_zip
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download 32-bit build artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build_32.outputs.artifact_name }}

      - name: Download 64-bit build artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build_64.outputs.artifact_name }}

      - name: Download server zip
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.server_zip.outputs.artifact_name }}

      - name: Create client zip
        run: |
          chmod 755 CryMP-Client32.exe CryMP-Client64.exe
          zip "CryMP-Client-${{ github.ref_name }}.zip" CryMP-Client32.* CryMP-Client64.*

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" *.zip \
            --repo="${{ github.repository }}" \
            --title="${{ github.ref_name }}" \
            --fail-on-no-commits \
            --generate-notes \
            --verify-tag

  publish:
    if: github.repository_owner == 'crymp-net'
    needs:
      - build_32
      - build_64
      - create_release
    uses: ./.github/workflows/publish.yml
    secrets: inherit
    with:
      context: release
      artifact_32: ${{ needs.build_32.outputs.artifact_name }}
      artifact_64: ${{ needs.build_64.outputs.artifact_name }}
